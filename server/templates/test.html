<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Generadores de Imágenes</title>
    <style>
        /* Estilos Generales */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor principal (el recuadro grande) */
        .contenedor-principal {
            background-color: white;
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
            margin-bottom: 30px;
        }

        /* Rejilla para las 4 imágenes (2x2) */
        .grid-imagenes {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Dos columnas iguales */
            gap: 20px; /* Espacio entre recuadros */
        }

        /* Estilo para cada recuadro individual de imagen */
        .tarjeta-imagen {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden; /* Mantiene la imagen dentro de las esquinas redondeadas */
            background-color: #fff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Efecto al pasar el ratón por encima */
        .tarjeta-imagen:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Estilo para los títulos sobre las imágenes */
        .titulo-imagen {
            background-color: #f8f9fa;
            color: #444;
            width: 100%;
            text-align: center;
            padding: 10px 0;
            margin: 0;
            font-size: 1.1em;
            font-weight: 600;
            border-bottom: 1px solid #e0e0e0;
        }

        /* Estilo para las imágenes */
        .tarjeta-imagen img {
            width: 100%;       /* Ocupa todo el ancho del recuadro */
            height: 250px;     /* Altura fija para que todas se vean iguales */
            object-fit: cover; /* Ajusta la imagen sin deformarla (recorta si es necesario) */
            display: block;
        }

        /* Adaptación para pantallas pequeñas (móviles) */
        @media (max-width: 600px) {
            .grid-imagenes {
                grid-template-columns: 1fr; /* Una sola columna en móviles */
            }
            .contenedor-principal {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <h1>Comparativa de Modelos IA</h1>

        <div class="grid-imagenes">

            <div class="tarjeta-imagen">
                <h2 class="titulo-imagen">Adobe Firefly 4</h2>
                <img src="{{ url_for('static', filename='img/adobe2.jpg') }}" alt="Generación con Adobe Firefly 4">
            </div>

            <div class="tarjeta-imagen">
                <h2 class="titulo-imagen">Dalle-3</h2>
                <img src="{{ url_for('static', filename='img/dalle_pato.png') }}" alt="Generación con Dalle-3">
            </div>

            <div class="tarjeta-imagen">
                <h2 class="titulo-imagen">Nano Banana 2</h2>
                <img src="{{ url_for('static', filename='img/gemini1.png') }}" alt="Generación con Gemini Nano">
            </div>

            <div class="tarjeta-imagen">
                <h2 class="titulo-imagen">Stable Diffusion</h2>
                <img src="{{ url_for('static', filename='img/stable_diffusion_pato.png') }}" alt="Generación con Stable Diffusion">
            </div>

        </div>
    </div>

</body>
</html>
